<!DOCTYPE html>
<html>
<head>
  <title>Deeplink Test</title>

  <script>
    function openApp() {
      const params = new URLSearchParams(window.location.search);
      const token = params.get("token") || "demo123";

      // Try to open app
      window.location.href = "https://spotilla://login?token=" + token;
    }
  </script>
</head>

<body onload="openApp()">
  <h2>Opening app...</h2>

  <p>If app does not open:</p>
  <ul>
    <li>Make sure app is installed</li>
    <li>Or tap below</li>
  </ul>

  <a id="manualLink" href="#">Open App Manually</a>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token") || "demo123";

    document.getElementById("manualLink").href =
      "spotilla://login?token=" + token;
  </script>
</body>
</html>
